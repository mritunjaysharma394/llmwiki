name: test

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (cassette replay, no API key)
        run: go test ./...
      - name: GoReleaser dry-run
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean --skip=publish
      # TODO: re-enable once the smoke cassette has been recorded against the
      # live API (see README "Development & contributing" — run
      # `LLMWIKI_RECORD=1 ANTHROPIC_API_KEY=... go test ./cmd/ -run TestSmokeIngestThenAsk -v`
      # and commit the resulting cassette under
      # internal/llm/testdata/cassettes/smoke__*.json). Until then, keeping the
      # `make smoke` step would make every PR's CI red.
      # - name: Smoke
      #   run: make smoke
